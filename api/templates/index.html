<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wumpus World AI</title>
    <style>
        /* CRITICAL: Forces borders to draw inside the box so they don't break the CSS Grid */
        * { box-sizing: border-box; }

        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: #121212; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 30px; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; /* Stops the grid from stretching vertically */
            gap: 40px; 
        }
        
        .sidebar { 
            background: #1e1e1e; 
            padding: 20px; 
            width: 320px; 
            border: 2px solid #333; 
        }
        
        h1 { 
            font-size: 20px; 
            margin-top: 0; 
            color: #4CAF50; 
            border-bottom: 2px solid #333; 
            padding-bottom: 15px; 
            text-transform: uppercase;
        }
        
        .control-group { margin-bottom: 25px; }
        label { font-size: 14px; color: #aaa; }
        
        input { 
            width: 50px; 
            padding: 6px; 
            background: #121212; 
            color: #fff; 
            border: 1px solid #4CAF50; 
            border-radius: 0; 
            font-family: 'Courier New', Courier, monospace;
        }
        
        button { 
            background: #333; 
            border: 1px solid #555; 
            padding: 12px 15px; 
            color: white; 
            border-radius: 0; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            margin-bottom: 10px; 
            transition: 0.1s;
            text-transform: uppercase;
            font-family: 'Courier New', Courier, monospace;
        }
        
        button:hover { background: #4CAF50; border-color: #4CAF50; color: #000; }
        button.god-mode { background: #1e1e1e; border-color: #ff9800; color: #ff9800; }
        button.god-mode:hover { background: #ff9800; color: #000; }
        button.ai-btn { background: #1e1e1e; border-color: #00bcd4; color: #00bcd4; }
        button.ai-btn:hover { background: #00bcd4; color: #000; }
        
        .grid-container { 
            display: grid; 
            gap: 2px; 
            background: #444; /* Background acts as the grid lines */
            padding: 2px; 
            border: 2px solid #555; 
            height: fit-content; /* Stops the empty space at the bottom */
        }
        
        .cell { 
            width: 80px; 
            height: 80px; 
            background: #1e1e1e; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
        }
        
        .cell.visited { background: #2a2a2a; }
        
        /* Outline instead of Border prevents the cells from shifting */
        .cell.safe { 
            outline: 2px solid #4CAF50; 
            outline-offset: -2px; 
            z-index: 1; /* Ensures outline draws over adjacent cells cleanly */
        } 
        
        .percepts-box { 
            background: #121212; 
            padding: 15px; 
            font-size: 14px; 
            margin-top: 15px; 
            border: 1px solid #333; 
            border-left: 4px solid #00bcd4; 
        }
        
        .controls-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 5px; 
            text-align: center; 
            margin-top: 20px; 
        }
        
        .controls-grid button { 
            width: auto; 
            background: #222; 
            border-color: #444; 
            font-size: 18px;
        }
        .controls-grid button:hover { background: #555; }
        
        /* Agent & Entity Alignment fixes */
        .agent, .hidden-entity { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .agent svg, .hidden-entity svg {
            width: 65%;
            height: 65%;
        }

        .agent { z-index: 10; animation: pop 0.2s ease; }
        @keyframes pop { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }
        
        .hidden-entity { opacity: 0; transition: opacity 0.2s; }
        .god-mode-active .hidden-entity { opacity: 0.4 !important; }
        .visited .hidden-entity { opacity: 1 !important; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>WUMPUS AGENT</h1>
        
        <div class="control-group">
            <label>GRID SIZE: <input type="number" id="gridSize" value="5" min="3" max="10"></label>
            <button onclick="apiCreateGrid()" style="margin-top: 15px;">GENERATE WORLD</button>
            <button onclick="toggleGodMode()" class="god-mode" id="godBtn">TOGGLE GOD MODE</button>
        </div>

        <button onclick="toggleAutoMove()" class="ai-btn" id="aiBtn">START AI AUTO-MOVE</button>

        <div class="percepts-box">
            <strong>INFERENCE STEPS:</strong> <span id="steps">0</span><br><br>
            <strong>CURRENT PERCEPTS:</strong> <br>
            <span id="percepts" style="color: #ffb74d;">None</span>
        </div>

        <div class="controls-grid">
            <div></div>
            <button onclick="apiMove('up')">&uarr;</button>
            <div></div>
            <button onclick="apiMove('left')">&larr;</button>
            <button onclick="apiMove('down')">&darr;</button>
            <button onclick="apiMove('right')">&rarr;</button>
        </div>
    </div>

    <div class="grid-container" id="gridUI"></div>

    <script>
        const graphics = {
            agent: `<svg viewBox="0 0 100 100"><rect x="30" y="40" width="40" height="50" fill="#2980b9"/><circle cx="50" cy="25" r="15" fill="#f1c40f"/><rect x="20" y="10" width="60" height="5" fill="#2c3e50"/><rect x="35" y="5" width="30" height="10" fill="#2c3e50"/></svg>`,
            dead: `<svg viewBox="0 0 100 100"><rect x="30" y="30" width="40" height="60" fill="#7f8c8d"/><rect x="20" y="80" width="60" height="10" fill="#95a5a6"/><path d="M 40 40 L 60 60 M 60 40 L 40 60" stroke="#2c3e50" stroke-width="5"/></svg>`,
            wumpus: `<svg viewBox="0 0 100 100"><polygon points="10,90 50,20 90,90" fill="#c0392b"/><polygon points="35,65 45,55 55,65" fill="#000"/><polygon points="65,65 55,55 45,65" fill="#000"/><rect x="40" y="75" width="20" height="5" fill="#fff"/></svg>`,
            gold: `<svg viewBox="0 0 100 100"><polygon points="50,15 85,50 50,85 15,50" fill="#f1c40f"/><polygon points="50,25 75,50 50,75 25,50" fill="#f39c12"/></svg>`,
            pit: `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="40" ry="20" fill="#000"/><ellipse cx="50" cy="50" rx="40" ry="20" stroke="#7f8c8d" stroke-width="4" fill="none"/></svg>`
        };

        let gridSize = 5;
        let backendGrid = null;
        let agentPos = {row: 0, col: 0};
        let safeCells = [];
        let visitedCells = [];
        let currentPercepts = "";
        let autoMoveInterval = null;
        let isGameOver = false;

        async function apiCreateGrid() {
            gridSize = parseInt(document.getElementById('gridSize').value);
            const res = await fetch('/create_grid', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rows: gridSize, cols: gridSize })
            });
            const data = await res.json();
            backendGrid = data.grid;
            
            agentPos = {row: 0, col: 0};
            safeCells = [];
            visitedCells = [{row: 0, col: 0}];
            currentPercepts = "None";
            isGameOver = false;
            
            document.getElementById('steps').textContent = "0";
            document.getElementById('percepts').textContent = "None";
            
            if(autoMoveInterval) toggleAutoMove();
            buildGridUI();
        }

        async function apiMove(action) {
            if (isGameOver) return;

            const res = await fetch('/move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action })
            });
            
            if (res.ok) {
                const data = await res.json();
                agentPos = data.agent_pos;
                safeCells = data.safe_cells || [];
                visitedCells = data.visited_cells;
                currentPercepts = data.current_percepts;
                
                document.getElementById('steps').textContent = data.inference_steps;
                document.getElementById('percepts').textContent = data.current_percepts;
                buildGridUI();

                if (data.game_over) {
                    isGameOver = true;
                    if(autoMoveInterval) toggleAutoMove();
                    
                    if (data.victory) {
                        setTimeout(() => alert("VICTORY: " + data.death_reason), 100);
                    } else {
                        setTimeout(() => alert("DEFEAT: " + data.death_reason), 100);
                    }
                }
            }
        }

        function toggleGodMode() {
            document.getElementById('gridUI').classList.toggle('god-mode-active');
        }

        function toggleAutoMove() {
            if (autoMoveInterval) {
                clearInterval(autoMoveInterval);
                autoMoveInterval = null;
                document.getElementById('aiBtn').innerText = "START AI AUTO-MOVE";
                document.getElementById('aiBtn').style.color = "#00bcd4";
                document.getElementById('aiBtn').style.borderColor = "#00bcd4";
            } else {
                if (isGameOver) {
                    alert("Game is over. Generate a new world.");
                    return;
                }
                autoMoveInterval = setInterval(performAIMove, 400);
                document.getElementById('aiBtn').innerText = "STOP AI AGENT";
                document.getElementById('aiBtn').style.color = "#f44336";
                document.getElementById('aiBtn').style.borderColor = "#f44336";
            }
        }

        async function performAIMove() {
            if (isGameOver) return;

            const directions = [
                { name: 'up', r: -1, c: 0 }, { name: 'down', r: 1, c: 0 },
                { name: 'left', r: 0, c: -1 }, { name: 'right', r: 0, c: 1 }
            ];

            let safeUnvisited = [];
            let validVisited = [];
            let unvisitedRisks = [];

            for (let dir of directions) {
                let nr = agentPos.row + dir.r;
                let nc = agentPos.col + dir.c;

                if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
                    let isVisited = visitedCells.some(cell => cell.row === nr && cell.col === nc);
                    let isSafe = safeCells.some(cell => cell.row === nr && cell.col === nc);

                    if (!isVisited && isSafe) {
                        safeUnvisited.push(dir.name);
                    } else if (isVisited) {
                        validVisited.push(dir.name);
                    } else {
                        unvisitedRisks.push(dir.name);
                    }
                }
            }

            let chosenMove = null;

            if (safeUnvisited.length > 0) {
                chosenMove = safeUnvisited[Math.floor(Math.random() * safeUnvisited.length)];
            } else if (validVisited.length > 0) {
                chosenMove = validVisited[Math.floor(Math.random() * validVisited.length)];
            } else if (unvisitedRisks.length > 0) {
                chosenMove = unvisitedRisks[Math.floor(Math.random() * unvisitedRisks.length)];
            }

            if (chosenMove) {
                await apiMove(chosenMove);
            } else {
                toggleAutoMove();
                alert("Agent is trapped with no valid moves.");
            }
        }

        function buildGridUI() {
            const container = document.getElementById('gridUI');
            container.style.gridTemplateColumns = `repeat(${gridSize}, 80px)`;
            container.style.gridTemplateRows = `repeat(${gridSize}, 80px)`;
            container.innerHTML = '';

            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const cellDiv = document.createElement('div');
                    cellDiv.className = 'cell';
                    
                    if (visitedCells.some(v => v.row === r && v.col === c)) cellDiv.classList.add('visited');
                    if (safeCells.some(s => s.row === r && s.col === c)) cellDiv.classList.add('safe');

                    let entityHtml = '';
                    if (backendGrid.gold.row === r && backendGrid.gold.col === c) {
                        entityHtml = `<div class="hidden-entity">${graphics.gold}</div>`;
                    } else if (backendGrid.wumpus.row === r && backendGrid.wumpus.col === c) {
                        entityHtml = `<div class="hidden-entity">${graphics.wumpus}</div>`;
                    } else if (backendGrid.pits.some(p => p.row === r && p.col === c)) {
                        entityHtml = `<div class="hidden-entity">${graphics.pit}</div>`;
                    }
                    cellDiv.innerHTML = entityHtml;

                    if (agentPos.row === r && agentPos.col === c) {
                        const agentDiv = document.createElement('div');
                        agentDiv.className = 'agent';
                        
                        if (isGameOver && !currentPercepts.includes("Glitter")) {
                            agentDiv.innerHTML = graphics.dead;
                        } else {
                            agentDiv.innerHTML = graphics.agent;
                        }
                        cellDiv.appendChild(agentDiv);
                    }

                    container.appendChild(cellDiv);
                }
            }
        }

        apiCreateGrid();
    </script>
</body>
</html>
